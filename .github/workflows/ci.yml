name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - run: npm install
      - run: npm run typecheck
      - run: npm run build

      # A duplicated shebang is a hard syntax error, and this package runs via
      # `npx`, so it would break every user. That bug shipped once (a tsup banner
      # stacked on top of the shebang esbuild already preserves) - hence the guard.
      - name: Exactly one shebang
        run: |
          count=$(grep -c '^#!' dist/index.js)
          echo "shebang lines: $count"
          [ "$count" = "1" ]

      - name: Speaks the MCP protocol
        run: node test/protocol.mjs
